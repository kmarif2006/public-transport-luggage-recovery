<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Route Map — TN Bus Lost Luggage</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- App CSS -->
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/map.css">
</head>

<body class="map-page-body">

  <!-- ===== Navbar ===== -->
  <nav class="main-nav">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        <i class="fas fa-bus-alt"></i>
        <span>TN Bus Lost Luggage</span>
      </a>
      <ul class="nav-links">
        <li><a href="/map.html" class="active">Map</a></li>
        <li><a href="/dashboard.html">My Reports</a></li>
        <li>
          <button id="logout-btn" class="logout-link">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- ===== Map Layout ===== -->
  <div class="map-layout">

    <!-- Instruction Banner (centered, above map) -->
    <div class="map-instruction" id="map-instruction">
      <i class="fas fa-hand-pointer"></i>
      <span>Tap a bus depot on the map to start</span>
    </div>

    <!-- ===== Left Control Panel ===== -->
    <div class="map-search-overlay" id="control-panel">

      <!-- Source Depot -->
      <div class="search-box">
        <div class="filter-row">
          <i class="fas fa-search"></i>
          <input type="text" id="source-filter" placeholder="Filter start depots...">
        </div>
        <select id="source-depot-select" aria-label="Select Starting Depot">
          <option value="">🟢 Select Starting Point</option>
        </select>
      </div>

      <!-- Destination Depot -->
      <div class="search-box">
        <div class="filter-row">
          <i class="fas fa-search"></i>
          <input type="text" id="destination-filter" placeholder="Filter destination depots...">
        </div>
        <select id="destination-depot-select" disabled aria-label="Select Destination Depot">
          <option value="">🏁 Select Destination</option>
        </select>
      </div>

      <!-- Draw Route Button -->
      <button id="draw-route-btn" class="btn-primary" disabled>
        <i class="fas fa-route"></i> Calculate Route
      </button>

      <!-- Route Info (hidden until route drawn) -->
      <div id="route-info" class="hidden">
        <p id="route-summary"></p>
        <div class="route-stats">
          <span><i class="fas fa-road"></i> <strong id="route-distance">—</strong></span>
          <span><i class="fas fa-warehouse"></i> <strong id="route-depot-count">—</strong> depots</span>
        </div>
      </div>

      <!-- Report Button (hidden until route drawn) -->
      <button id="report-luggage-btn" class="btn-primary hidden" style="background: #16a34a; margin-top: 0.25rem;">
        <i class="fas fa-plus-circle"></i> Report Lost Luggage
      </button>

    </div><!-- /control-panel -->

    <!-- ===== The Leaflet Map ===== -->
    <div id="map"></div>

  </div><!-- /map-layout -->

  <!-- ===== Report Modal ===== -->
  <div id="report-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="auth-card" style="max-width: 580px; width: 100%; max-height: 92vh; overflow-y: auto; margin: 0;">

      <!-- Header -->
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem;">
        <div>
          <h2 id="modal-title" style="margin:0; font-size: 1.3rem;">📋 Report Lost Luggage</h2>
          <p style="margin:0; color:#6b7280; font-size:0.82rem;">தமிழ்நாடு பேருந்து இழந்த சாமான் அறிக்கை</p>
        </div>
        <button onclick="closeReportModal()"
          style="background:none; border:none; font-size: 1.6rem; cursor: pointer; line-height:1; color:#6b7280;"
          aria-label="Close modal">&times;</button>
      </div>

      <!-- Route context -->
      <div id="modal-route-context"
        style="background:#f0fdf4; border: 1px solid #bbf7d0; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1.2rem; font-size:0.85rem; color:#166534;">
        <i class="fas fa-route"></i> <strong id="modal-route-text">Route</strong>
      </div>

      <form id="report-form" novalidate>
        <input type="hidden" id="depot-id-input">

        <!-- Item Name -->
        <div class="form-group">
          <label for="item-name"><i class="fas fa-suitcase"></i> What did you lose? <span
              style="color:red">*</span></label>
          <input type="text" id="item-name" placeholder="e.g. Black backpack, red trolley bag" required>
        </div>

        <!-- Description -->
        <div class="form-group">
          <label for="item-description">
            <i class="fas fa-align-left"></i> Describe it clearly
            <span style="color:red">*</span>
          </label>
          <textarea id="item-description" rows="3" maxlength="300"
            placeholder="Colour, size, brand, special marks... The more detail, the better the AI match."
            required></textarea>
          <small style="color:#9ca3af">
            <span id="char-count">0</span>/300 characters
          </small>
        </div>

        <!-- Date + Bus Number row -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="date-lost"><i class="fas fa-calendar"></i> Date Lost <span style="color:red">*</span></label>
            <input type="date" id="date-lost" required>
          </div>
          <div class="form-group">
            <label for="bus-number"><i class="fas fa-bus"></i> Bus Number <small
                style="color:#9ca3af">(optional)</small></label>
            <input type="text" id="bus-number" placeholder="e.g. TN01 AB 1234">
          </div>
        </div>

        <!-- Contact + Photo row -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label for="contact-phone"><i class="fas fa-phone"></i> Your Mobile <span style="color:red">*</span></label>
            <input type="tel" id="contact-phone" placeholder="10-digit number" pattern="[0-9]{10}" required>
          </div>
          <div class="form-group">
            <label for="photo_upload"><i class="fas fa-camera"></i> Photo <small
                style="color:#9ca3af">(optional)</small></label>
            <input type="file" id="photo_upload" accept="image/*" style="padding-top:0.35rem;">
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-primary" id="submit-report-btn" style="margin-top: 0.5rem;">
          <i class="fas fa-paper-plane"></i> Submit Report
        </button>
        <button type="button" class="btn-primary btn-secondary mt-2" onclick="closeReportModal()"
          style="padding:0.7rem;">
          <i class="fas fa-arrow-left"></i> Back to Map
        </button>
      </form>
    </div>
  </div>

  <!-- Leaflet + Routing JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
  <!-- App JS -->
  <script src="/js/auth.js"></script>
  <script src="/js/map.js?v=5.0"></script>
  <script>
    /** 
     * ULTIMATE FALLBACK & TRACE:
     */
    console.log('[MAP-INLINE] Script block evaluated.');

    function runBoot() {
      console.log('[MAP-INLINE] runBoot() starting...');

      const token = localStorage.getItem('jwt_token');
      console.log('[MAP-INLINE] Token status:', !!token);

      if (!token) {
        console.warn('[MAP-INLINE] Redirecting to login.');
        window.location.href = '/login.html';
        return;
      }

      console.log('[MAP-INLINE] Checking for L...');
      if (typeof L === 'undefined') {
        console.error('[MAP-INLINE] Leaflet (L) is MISSING!');
        return;
      }
      console.log('[MAP-INLINE] L found. tnMap status:', !!window.tnMap);

      if (!window.tnMap) {
        try {
          console.log('[MAP-INLINE] Checking for initMap function...');
          if (typeof initMap === 'function') {
            console.log('[MAP-INLINE] Calling initMap()...');
            initMap();
            console.log('[MAP-INLINE] initMap() completed.');
          } else {
            console.error('[MAP-INLINE] initMap function NOT FOUND!');
          }
        } catch (e) {
          console.error('[MAP-INLINE] CRASH during boot:', e);
        }
      } else {
        console.log('[MAP-INLINE] Map already initialized (tnMap exists).');
      }
    }

    if (document.readyState === 'complete') {
      runBoot();
    } else {
      window.addEventListener('load', runBoot);
    }

    // Heartbeat to see if JS is still alive
    setInterval(() => console.log('[MAP-HEARTBEAT] ' + new Date().toLocaleTimeString()), 2000);

    // Logout handler
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('jwt_token');
      localStorage.removeItem('user_role');
      window.location.href = '/login.html';
    });
  </script>
</body>

</html>
